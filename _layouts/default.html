<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* NAVBAR */
.navbar {
  position: sticky;
  top: 0;
  backdrop-filter: blur(15px);
  background: rgba(0,0,0,0.4);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

.navbar a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.navbar a:hover {
  color: #00f2fe;
}

/* CONTAINER */
.container {
  padding: 40px;
  max-width: 1100px;
  margin: auto;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
  outline: none;
}

/* CARD UI */
.post-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.post-card:hover {
  transform: translateY(-5px) scale(1.01);
  background: rgba(0,255,255,0.1);
}

/* HEADINGS */
h1, h2, h3 {
  margin-bottom: 10px;
}

/* IMAGE */
img {
  width: 100%;
  border-radius: 10px;
  margin: 15px 0;
}

/* COMMENT BOX */
.comment-box {
  margin-top: 50px;
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
}

.comment-box input,
.comment-box textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 8px;
}

.comment-box button {
  padding: 10px;
  background: #00f2fe;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.comment {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

/* ANIMATION */
.fade {
  animation: fade 0.6s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<nav class="navbar">
  <a href="{{ '/' | relative_url }}">Home</a>
  <a href="{{ '/blog/' | relative_url }}">My Journey</a>
  <a href="{{ '/about/' | relative_url }}">About</a>
  <a href="{{ '/contact/' | relative_url }}">Contact</a>
</nav>

<div class="container fade">
  {{ content }}
</div>

</body>
</html>
