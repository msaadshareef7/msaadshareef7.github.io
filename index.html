<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCanvas | Advanced Blog</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{display:flex;background:#0f172a;color:white;transition:.4s}

.sidebar{width:220px;height:100vh;background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);padding-top:30px;position:fixed;left:0;transition:.3s}
.sidebar.hide{left:-220px}
.sidebar h2{text-align:center;margin-bottom:30px}
.sidebar a{display:block;padding:12px;color:white;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:rgba(0,255,255,0.2)}

.menu-btn{position:fixed;top:10px;left:10px;background:#00f2fe;border:none;padding:10px;border-radius:6px;cursor:pointer}

.main{margin-left:220px;padding:40px;width:100%;transition:.3s}
.main.full{margin-left:0}

.page{display:none}
.page.active{display:block}

.card{background:rgba(255,255,255,0.08);padding:20px;margin:15px 0;border-radius:15px}
.card img{width:100%;border-radius:10px;margin-top:10px}

button{margin-top:10px;padding:8px;border:none;border-radius:6px;cursor:pointer}

.search{padding:10px;width:100%;border-radius:8px;margin:10px 0}

.toggle{position:fixed;bottom:20px;right:20px;background:#00f2fe}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
<h2>🚀 CodeCanvas</h2>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('blog')">Blog</a>
<a onclick="showPage('about')">About</a>
<a onclick="showPage('contact')">Contact</a>
</div>

<div class="main" id="main">

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome 🚀</h1>
<input class="search" placeholder="Search posts..." onkeyup="searchPosts(this.value)">
<div id="homePosts"></div>
</div>

<!-- BLOG -->
<div id="blog" class="page">
<h2>All Posts</h2>
<input class="search" placeholder="Search posts..." onkeyup="searchPosts(this.value)">
<div id="blogPosts"></div>
</div>

<!-- POST VIEW -->
<div id="postView" class="page">
<button onclick="showPage('home')">⬅ Back</button>
<h2 id="postTitle"></h2>
<img id="postImg" />
<p id="postContent"></p>

<h3>Comments</h3>
<input id="commentInput" placeholder="Write comment...">
<button onclick="addComment()">Post</button>
<div id="comments"></div>
</div>

<!-- ABOUT -->
<div id="about" class="page">
<h2>About</h2>
<div class="card">I am a student developer.</div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
<h2>Contact</h2>
<div class="card">Email: your@email.com</div>
</div>

</div>

<button class="toggle" onclick="toggleMode()">🌙</button>

<script>
let currentPostIndex = 0;

const posts = [
{
title:"My First Blog",
desc:"This is my university blog project.",
content:"Full details of my first blog post...",
img:"https://via.placeholder.com/600x300"
},
{
title:"Learning Web Dev",
desc:"Exploring modern UI.",
content:"Full content about learning web development...",
img:"https://via.placeholder.com/600x300"
}
];

function renderPosts(list=posts){
let home="";
let blog="";

list.forEach((p,i)=>{
let card=`<div class="card">
<h3>${p.title}</h3>
<p>${p.desc}</p>
<img src="${p.img}">
<button onclick="openPost(${i})">Read More</button>
</div>`;

home+=card;
blog+=card;
});

document.getElementById("homePosts").innerHTML=home;
document.getElementById("blogPosts").innerHTML=blog;
}

function openPost(i){
currentPostIndex=i;
document.getElementById("postTitle").innerText=posts[i].title;
document.getElementById("postContent").innerText=posts[i].content;
document.getElementById("postImg").src=posts[i].img;
document.getElementById("comments").innerHTML="";
showPage('postView');
}

function addComment(){
let text=document.getElementById("commentInput").value;
if(text==="") return;
let div=document.createElement("div");
div.className="card";
div.innerText=text;
document.getElementById("comments").appendChild(div);
document.getElementById("commentInput").value="";
}

function searchPosts(value){
let filtered=posts.filter(p=>p.title.toLowerCase().includes(value.toLowerCase()));
renderPosts(filtered);
}

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleMode(){
document.body.classList.toggle("light");
}

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("hide");
document.getElementById("main").classList.toggle("full");
}

renderPosts();
</script>

</body>
</html>
