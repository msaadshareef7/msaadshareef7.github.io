<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCanvas | Pro Portfolio (Fixed)</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{display:flex;background:#0f172a;color:white}

/* SIDEBAR */
.sidebar{width:240px;height:100vh;background:linear-gradient(180deg,#020617,#0f172a);padding:20px;position:fixed;left:0;top:0;transition:.3s;z-index:999}
.sidebar.hide{left:-240px}
.sidebar h2{margin-bottom:20px;text-align:center;color:#00f2fe}
.sidebar a{display:block;padding:12px;border-radius:8px;margin:5px 0;cursor:pointer}
.sidebar a:hover,.sidebar a.active{background:#00f2fe;color:black}

/* MENU BUTTON (FIXED) */
.menu-btn{position:fixed;top:15px;left:15px;background:#00f2fe;border:none;padding:10px;border-radius:8px;cursor:pointer;z-index:1001}

.main{margin-left:240px;padding:40px;width:100%;transition:.3s}
.main.full{margin-left:0}

.page{display:none}
.page.active{display:block}

/* HERO */
.hero{padding:60px;text-align:center}
.hero h1{font-size:3rem;background:linear-gradient(90deg,#00f2fe,#4facfe);-webkit-background-clip:text;color:transparent}
.hero p{opacity:.7}

/* CARD */
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin:20px 0;transition:.3s;box-shadow:0 10px 20px rgba(0,0,0,0.3)}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;border-radius:10px;margin-top:10px}

button{margin-top:10px;padding:10px;border:none;border-radius:8px;background:#00f2fe;color:black;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}

.search{padding:12px;width:100%;border-radius:10px;border:none;margin:20px 0}

/* DARK MODE */
.light{background:#f5f5f5;color:black}
.light .card{background:white}
.light .sidebar{background:#ddd}

.toggle{position:fixed;bottom:20px;right:20px;background:#00f2fe;border:none;padding:12px;border-radius:50%;z-index:1001}

.fade{animation:fade .5s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* COMMENT SECTION */
.comment-box{margin-top:20px}
.comment-box input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:10px}
.comment{background:rgba(255,255,255,0.08);padding:10px;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="sidebar" id="sidebar">
<h2>🚀 CodeCanvas</h2>
<a onclick="showPage(event,'home')" class="active">Home</a>
<a onclick="showPage(event,'blog')">Blog</a>
<a onclick="showPage(event,'about')">About</a>
<a onclick="showPage(event,'contact')">Contact</a>
</div>

<div class="main" id="main">

<!-- HOME -->
<div id="home" class="page active fade">
<div class="hero">
<h1>Hi, I'm Saad 👋</h1>
<p>Frontend Developer | Student</p>
</div>
<input class="search" placeholder="Search posts..." onkeyup="searchPosts(this.value)">
<div id="homePosts" class="grid"></div>
</div>

<!-- BLOG -->
<div id="blog" class="page fade">
<h2>All Posts</h2>
<input class="search" placeholder="Search posts..." onkeyup="searchPosts(this.value)">
<div id="blogPosts" class="grid"></div>
</div>

<!-- POST VIEW (COMMENT FIXED) -->
<div id="postView" class="page fade">
<button onclick="showPage(null,'home')">⬅ Back</button>
<h2 id="postTitle"></h2>
<img id="postImg">
<p id="postContent"></p>

<div class="comment-box">
<h3>Comments</h3>
<input id="commentInput" placeholder="Write a comment...">
<button onclick="addComment()">Post</button>
<div id="comments"></div>
</div>
</div>

<!-- ABOUT -->
<div id="about" class="page fade">
<h2>About Me</h2>
<div class="card">I am a passionate developer building modern web apps.</div>
</div>

<!-- CONTACT -->
<div id="contact" class="page fade">
<h2>Contact</h2>
<div class="card">Email: your@email.com</div>
</div>

</div>

<button class="toggle" onclick="toggleMode()">🌙</button>

<script>
const posts=[
{title:"My First Blog",desc:"University project.",content:"Full blog content here...",img:"https://via.placeholder.com/600"},
{title:"Learning Web Dev",desc:"Modern UI journey.",content:"Learning HTML CSS JS...",img:"https://via.placeholder.com/600"}
];

function renderPosts(list=posts){
let home="",blog="";
list.forEach((p,i)=>{
let card=`<div class="card fade">
<h3>${p.title}</h3>
<p>${p.desc}</p>
<img src="${p.img}">
<button onclick="openPost(${i})">Read More</button>
</div>`;
home+=card;blog+=card;
});
document.getElementById("homePosts").innerHTML=home;
document.getElementById("blogPosts").innerHTML=blog;
}

function openPost(i){
document.getElementById("postTitle").innerText=posts[i].title;
document.getElementById("postContent").innerText=posts[i].content;
document.getElementById("postImg").src=posts[i].img;
document.getElementById("comments").innerHTML="";
showPage(null,'postView');
}

function addComment(){
let text=document.getElementById("commentInput").value;
if(text==="") return;
let div=document.createElement("div");
div.className="comment";
div.innerText=text;
document.getElementById("comments").appendChild(div);
document.getElementById("commentInput").value="";
}

function searchPosts(v){
let f=posts.filter(p=>p.title.toLowerCase().includes(v.toLowerCase()));
renderPosts(f);
}

function showPage(e,id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
if(e){document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('active'));e.target.classList.add('active');}
}

function toggleMode(){document.body.classList.toggle("light")}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("hide");document.getElementById("main").classList.toggle("full")}

renderPosts();
</script>

</body>
</html>
