<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCanvas | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#0f172a;color:white}

/* NAV */
.nav{
position:fixed;
top:0;left:0;
width:100%;
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.sidebar{
position:fixed;
left:-220px;
top:0;
width:220px;
height:100%;
background:#020617;
padding:20px;
transition:.3s;
}
.sidebar.active{left:0}
.sidebar a{
display:block;
padding:12px;
margin:5px 0;
cursor:pointer;
font-weight:bold;
}
.sidebar a:hover{background:#00f2fe;color:black}

/* HOME */
.home{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1{
font-size:2.5rem;
color:#00f2fe;
margin-bottom:20px;
}

.buttons button{
padding:12px 20px;
margin:10px;
font-weight:bold;
border:none;
border-radius:8px;
background:#00f2fe;
cursor:pointer;
}

/* POSTS */
.container{
padding:80px 20px;
max-width:900px;
margin:auto;
}

.post-card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:15px 0;
border-radius:12px;
cursor:pointer;
}

.post-card:hover{transform:scale(1.02)}

/* COMMENT BOX */
.comment-box{
margin-top:30px;
padding:20px;
background:#020617;
border-radius:10px;
}

.comment-box input,
.comment-box textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

.comment-box button{
background:#00f2fe;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.search{
width:100%;
padding:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
}

</style>
</head>

<body>

<div class="nav">
<div class="menu-btn" onclick="toggleSidebar()">☰</div>
<div>CodeCanvas</div>
</div>

<div class="sidebar" id="sidebar">
<a href="/">Home</a>
<a href="/blog.html">My Journey</a>
<a href="/about.html">About</a>
<a href="/contact.html">Contact</a>
</div>

<!-- HOME -->
<div class="home">
<h1 id="typing"></h1>
<div class="buttons">
<button onclick="location.href='/blog.html'">My Journey</button>
<button onclick="location.href='/about.html'">About</button>
<button onclick="location.href='/contact.html'">Contact</button>
</div>
</div>

<script>
function toggleSidebar(){
document.getElementById('sidebar').classList.toggle('active');
}

const text="Welcome to CodeCanvas - M Saad Ali";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}}
typing();
</script>

</body>
</html>
